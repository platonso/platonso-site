<style>
  .home-info ul {
    list-style: disc;
    padding-inline-start: 20px;
  }
  h1:hover .anchor, h2:hover .anchor, h3:hover .anchor,
  h4:hover .anchor, h5:hover .anchor, h6:hover .anchor {
    display: none;
  }
  .page-header h1, .post-title { font-size: 32px; }

  /* ── Burger menu ── */
  .burger {
    display: none;
  }

  .burger__btn {
    list-style: none;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--primary);
  }
  .burger__btn::-webkit-details-marker {
    display: none;
  }
  .burger__btn:hover {
    background: var(--entry);
  }
  .burger__btn svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  .burger__panel {
    position: absolute;
    right: 20px;
    top: var(--header-height);
    min-width: 220px;
    background: var(--theme);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    z-index: 1000;
  }

  .burger__link {
    padding: 6px 10px;
    border-radius: 10px;
    color: var(--primary);
    text-decoration: none;
    font-size: 16px;
    line-height: 2.3;
  }
  .burger__link:hover {
    background: var(--entry);
    color: var(--primary);
  }

  .burger__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px 6px;
    margin-bottom: 6px;
    border-bottom: 1px solid var(--border);
    line-height: 1;
  }

  .burger__title {
    font-weight: 600;
    color: var(--primary);
  }

  .burger__close {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: transparent;
    border: none;
    color: var(--primary);
    transition: background-color 200ms ease;
  }
  .burger__close:hover {
    background: var(--entry);
  }
  .burger__close svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  /* Mobile: show burger, hide #menu */
  @media screen and (max-width: 768px) {
    #menu {
      display: none;
    }

    .burger {
      display: flex;
      align-items: center;
      margin: auto var(--gap);
    }

    /* Panel becomes a full-width top sheet */
    .burger__panel {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      min-width: 0;
      border-radius: 0 0 14px 14px;
      padding: 20px 14px 14px;
      border: none;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      transform: translateY(-110%);
      transition: transform 220ms ease;
    }

    .burger[open] .burger__panel {
      transform: translateY(0);
    }
  }
</style>
